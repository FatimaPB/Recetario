<div class="min-h-screen flex items-center justify-center bg-white">

  <div class="bg-white w-full max-w-md p-8 rounded-2xl shadow-2xl border border-gray-100">

    <!-- Logo / Título -->
    <div class="text-center mb-8">
      <div
        class="mx-auto mb-3 h-14 w-14 flex items-center justify-center
               rounded-full bg-orange-500 text-white text-2xl font-bold shadow-md">
        HP
      </div>
      <h2 class="text-3xl font-bold text-blue-800">
        Hotel Posada
      </h2>
      <p class="text-sm text-gray-500">
        Acceso al sistema administrativo
      </p>
    </div>

    <!-- FORMULARIO -->
    <form (ngSubmit)="iniciarSesion()" class="space-y-6">

      <!-- Email -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Correo electrónico
        </label>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          required
          placeholder="correo@ejemplo.com"
          class="w-full px-4 py-2 border border-gray-300 rounded-xl
                 focus:outline-none focus:ring-2 focus:ring-orange-400
                 focus:border-orange-400 transition"
        />
      </div>

      <!-- Contraseña -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Contraseña
        </label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          placeholder="Ingresa tu contraseña"
          class="w-full px-4 py-2 border border-gray-300 rounded-xl
                 focus:outline-none focus:ring-2 focus:ring-orange-400
                 focus:border-orange-400 transition"
        />
      </div>

      <!-- Error -->
      <p *ngIf="error" class="text-red-600 text-sm text-center">
        {{ error }}
      </p>

      <!-- Botón -->
      <button
        type="submit"
        class="w-full py-3 bg-orange-500 text-white font-semibold rounded-xl
               hover:bg-orange-600 transition duration-300
               shadow-md hover:shadow-lg active:scale-95"
      >
        Iniciar sesión
      </button>

    </form>

    <!-- Footer -->
    <p class="mt-8 text-center text-xs text-gray-400">
      © 2026 Hotel Posada · Sistema interno
    </p>

  </div>
</div>
