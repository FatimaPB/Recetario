<!-- TOASTS -->
<div class="fixed top-6 right-6 z-[9999] space-y-3">

  <div *ngFor="let toast of toasts" class="min-w-[280px] max-w-sm px-5 py-4 rounded-2xl shadow-2xl
            text-white text-sm font-medium
            animate-[fadeIn_0.3s_ease-out]" [ngClass]="{
       'bg-emerald-600': toast.tipo === 'success',
       'bg-red-600': toast.tipo === 'error',
       'bg-amber-500 text-black': toast.tipo === 'warning',
       'bg-blue-600': toast.tipo === 'info'
     }">

    <div class="flex items-center gap-3">

      <!-- ICONO -->
      <div [ngClass]="{
            'text-emerald-300': toast.tipo === 'success',
            'text-red-300': toast.tipo === 'error',
            'text-yellow-300': toast.tipo === 'warning',
            'text-blue-300': toast.tipo === 'info'
          }">

        <i *ngIf="toast.tipo === 'success'" class="fa-solid fa-circle-check"></i>
        <i *ngIf="toast.tipo === 'error'" class="fa-solid fa-circle-xmark"></i>
        <i *ngIf="toast.tipo === 'warning'" class="fa-solid fa-triangle-exclamation"></i>
        <i *ngIf="toast.tipo === 'info'" class="fa-solid fa-circle-info"></i>

      </div>

      <!-- MENSAJE -->
      <div class="flex-1">
        {{ toast.mensaje }}
      </div>

      <!-- BOTÓN CERRAR -->
      <button (click)="cerrarToast(toast.id)" class="text-white/70 hover:text-white transition">
        ✕
      </button>

    </div>

    <!-- BARRA DE PROGRESO -->
    <div class="mt-3 h-1 rounded-full overflow-hidden bg-white/20">
      <div class="h-full bg-white w-full animate-progress"></div>
    </div>

  </div>

</div>



<!-- HEADER -->
<div class="flex justify-between items-center mb-6">

  <div>
    <h1 class="text-2xl font-semibold text-gray-800">Ingredientes</h1>
    <p class="text-sm text-gray-500">
      Listado maestro de insumos disponibles.
    </p>
  </div>

  <button (click)="abrirDrawer()"
    class="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2.5 rounded-xl shadow-lg hover:shadow-xl transition text-sm font-medium">
    <i class="fa-solid fa-plus"></i>
    Agregar Ingrediente
  </button>

</div>


<!-- CARD -->
<div class="bg-white rounded-xl shadow-md w-full">

  <!-- BUSCADOR -->
  <div class="flex justify-between items-center p-5 border-b">

    <div class="relative w-full max-w-md">
      <input type="text" placeholder="Buscar ingrediente..." [(ngModel)]="filtro"
        class="w-full pl-11 pr-4 py-2.5 text-sm border rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none" />

      <!-- ICONO SEARCH -->
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-gray-400 absolute left-3 top-3" fill="none"
        viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M10 18a8 8 0 100-16 8 8 0 000 16z" />
      </svg>
    </div>

  </div>


  <!-- TABLA -->
  <div class="overflow-x-auto">

    <table class="w-full text-sm">

      <thead>
        <tr class="text-left text-xs text-gray-500 uppercase tracking-wide border-b">
          <th class="px-6 py-4">Nombre</th>
          <th class="px-6 py-4">Unidad</th>
          <th class="px-6 py-4">Costo Unitario</th>
          <th class="px-6 py-4 text-center">Acciones</th>
        </tr>
      </thead>

      <tbody>

        <!-- SIN DATOS -->
        <tr *ngIf="ingredientesFiltrados.length === 0">
          <td colspan="4" class="text-center py-6 text-gray-400">
            No hay ingredientes registrados.
          </td>
        </tr>

        <!-- LISTA -->
        <tr *ngFor="let i of ingredientesFiltrados" class="border-t hover:bg-gray-50 transition">

          <td class="px-6 py-4 font-medium text-gray-800">
            {{ i.nombre }}
          </td>

          <td class="px-6 py-4">
            <span class="bg-gray-200 text-gray-600 text-xs px-2.5 py-1 rounded-lg">
              {{ i.unidad_base }}
            </span>
          </td>

          <td class="px-6 py-4 font-mono text-gray-700">
            ${{ i.costo_presentacion }}
          </td>

          <td class="px-6 py-4 text-center">

            <div class="flex justify-center gap-4">

              <!-- EDITAR -->
              <button (click)="editar(i)" class="text-blue-600 hover:text-blue-800 transition" title="Editar">
                <i class="fa-solid fa-pen"></i>
              </button>

              <!-- ELIMINAR -->
              <button (click)="eliminar(i.id_ingrediente!)" class="text-red-600 hover:text-red-800 transition"
                title="Eliminar">
                <i class="fa-solid fa-trash"></i>
              </button>

            </div>

          </td>

        </tr>

      </tbody>

    </table>

  </div>

</div>


<!-- OVERLAY + DRAWER -->
<div *ngIf="mostrarDrawer" class="fixed inset-0 z-50">

  <!-- FONDO DIFUMINADO -->
  <div class="absolute inset-0 bg-black/30 backdrop-blur-sm overlay-fade" (click)="cerrarDrawer()">
  </div>

  <!-- DRAWER -->
  <div class="absolute top-0 right-0 h-full w-[420px] bg-white shadow-2xl
              animate-slide-in">

    <div class="h-full flex flex-col p-8">

      <!-- HEADER -->
      <div class="flex justify-between items-center mb-8">
        <h2 class="text-xl font-semibold text-gray-800">
          {{ editando ? 'Editar Ingrediente' : 'Nuevo Ingrediente' }}
        </h2>

        <button (click)="cerrarDrawer()" class="text-gray-400 hover:text-gray-700 text-xl">
          ✕
        </button>
      </div>


      <form (ngSubmit)="guardar()" class="flex flex-col flex-1">

        <!-- Nombre -->
        <div class="mb-6">
          <label class="block text-sm text-gray-600 mb-2">
            Nombre del Ingrediente
          </label>
          <input type="text" [(ngModel)]="ingrediente.nombre" name="nombre"
            class="w-full px-4 py-3 border rounded-2xl focus:ring-2 focus:ring-emerald-500 outline-none">
        </div>

        <!-- Unidad + Costo -->
        <div class="grid grid-cols-2 gap-4 mb-6">

          <div>
            <label class="block text-sm text-gray-600 mb-2">
              Unidad
            </label>
            <select [(ngModel)]="ingrediente.unidad_base" name="unidad_base"
              class="w-full px-4 py-3 border rounded-2xl focus:ring-2 focus:ring-emerald-500 outline-none">
              <option value="kg">Kilogramo (kg)</option>
              <option value="g">Gramo (g)</option>
              <option value="L">Litro (L)</option>
              <option value="ml">Mililitro (ml)</option>
              <option value="pieza">Pieza</option>
            </select>
          </div>

          <div>
            <label class="block text-sm text-gray-600 mb-2">
              Costo
            </label>
            <input type="number" [(ngModel)]="ingrediente.costo_presentacion" name="costo_presentacion"
              class="w-full px-4 py-3 border rounded-2xl focus:ring-2 focus:ring-emerald-500 outline-none">
          </div>

        </div>

        <!-- Cantidad -->
        <div class="mb-8">
          <label class="block text-sm text-gray-600 mb-2">
            Cantidad Presentación
          </label>
          <input type="number" [(ngModel)]="ingrediente.cantidad_presentacion" name="cantidad_presentacion"
            class="w-full px-4 py-3 border rounded-2xl focus:ring-2 focus:ring-emerald-500 outline-none">
        </div>

        <!-- BOTÓN -->
        <button type="submit"
          class="mt-auto bg-emerald-600 hover:bg-emerald-700 text-white py-3 rounded-xl shadow-lg hover:shadow-xl transition text-sm font-medium">
          {{ editando ? 'Actualizar Ingrediente' : 'Guardar Ingrediente' }}
        </button>

      </form>

    </div>

  </div>
