<!-- TOASTS -->
<div class="fixed top-6 right-6 z-[9999] space-y-3">

  <div *ngFor="let toast of toasts" class="min-w-[280px] max-w-sm px-5 py-4 rounded-2xl shadow-2xl
            text-white text-sm font-medium
            animate-[fadeIn_0.3s_ease-out]" [ngClass]="{
       'bg-emerald-600': toast.tipo === 'success',
       'bg-red-600': toast.tipo === 'error',
       'bg-amber-500 text-black': toast.tipo === 'warning',
       'bg-blue-600': toast.tipo === 'info'
     }">

    <div class="flex items-center gap-3">

      <!-- ICONO -->
      <div [ngClass]="{
            'text-emerald-300': toast.tipo === 'success',
            'text-red-300': toast.tipo === 'error',
            'text-yellow-300': toast.tipo === 'warning',
            'text-blue-300': toast.tipo === 'info'
          }">

        <i *ngIf="toast.tipo === 'success'" class="fa-solid fa-circle-check"></i>
        <i *ngIf="toast.tipo === 'error'" class="fa-solid fa-circle-xmark"></i>
        <i *ngIf="toast.tipo === 'warning'" class="fa-solid fa-triangle-exclamation"></i>
        <i *ngIf="toast.tipo === 'info'" class="fa-solid fa-circle-info"></i>

      </div>

      <!-- MENSAJE -->
      <div class="flex-1">
        {{ toast.mensaje }}
      </div>

      <!-- BOTÓN CERRAR -->
      <button (click)="cerrarToast(toast.id)" class="text-white/70 hover:text-white transition">
        ✕
      </button>

    </div>

    <!-- BARRA DE PROGRESO -->
    <div class="mt-3 h-1 rounded-full overflow-hidden bg-white/20">
      <div class="h-full bg-white w-full animate-progress"></div>
    </div>

  </div>

</div>


<!-- HEADER -->
<div class="flex justify-between items-center mb-6">

  <div>
    <h1 class="text-2xl font-semibold text-gray-800">
      Configuración de Precios
    </h1>
    <p class="text-sm text-gray-500">
      Parámetros globales para el cálculo automático de precios.
    </p>
  </div>

</div>


<!-- CARD -->
<div class="bg-white rounded-xl shadow-md w-full">

  <!-- CONTENIDO -->
  <div class="p-8">

    <form (ngSubmit)="guardar()" class="space-y-8">

      <!-- GRID CONFIG -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

        <!-- GANANCIA -->
        <div>
          <label class="block text-sm text-gray-600 mb-2">
            Ganancia (%)
          </label>

          <div class="relative">
            <input type="number"
                   step="0.01"
                   [(ngModel)]="configuracion.ganancia_porcentaje"
                   name="ganancia_porcentaje"
                   class="w-full px-4 py-3 pr-10 border rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm">

            <span class="absolute right-4 top-3 text-gray-400 text-sm">
              %
            </span>
          </div>
        </div>

        <!-- IVA -->
        <div>
          <label class="block text-sm text-gray-600 mb-2">
            IVA (%)
          </label>

          <div class="relative">
            <input type="number"
                   step="0.01"
                   [(ngModel)]="configuracion.iva_porcentaje"
                   name="iva_porcentaje"
                   class="w-full px-4 py-3 pr-10 border rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm">

            <span class="absolute right-4 top-3 text-gray-400 text-sm">
              %
            </span>
          </div>
        </div>

        <!-- SERVICIO -->
        <div>
          <label class="block text-sm text-gray-600 mb-2">
            Servicio (%)
          </label>

          <div class="relative">
            <input type="number"
                   step="0.01"
                   [(ngModel)]="configuracion.servicio_porcentaje"
                   name="servicio_porcentaje"
                   class="w-full px-4 py-3 pr-10 border rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm">

            <span class="absolute right-4 top-3 text-gray-400 text-sm">
              %
            </span>
          </div>
        </div>

      </div>

      <!-- BOTÓN -->
      <div class="flex justify-end pt-4 border-t">

        <button type="submit"
          class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-xl shadow-lg hover:shadow-xl transition text-sm font-medium disabled:opacity-60 disabled:cursor-not-allowed"
          [disabled]="cargando">

          <i class="fa-solid fa-floppy-disk"></i>

          {{ cargando ? 'Guardando...' : 'Guardar Configuración' }}

        </button>

      </div>

    </form>

  </div>

</div>
