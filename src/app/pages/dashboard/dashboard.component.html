<!-- HEADER -->
<div class="flex justify-between items-center mb-8">
  <div>
    <h1 class="text-2xl font-semibold text-gray-800">
      Dashboard
    </h1>
    <p class="text-sm text-gray-500">
      Resumen general del sistema de gestión del recetario.
    </p>
  </div>
</div>


<!-- CARDS -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">

  <!-- PLATILLOS -->
  <div class="bg-white rounded-xl shadow-md p-6 border border-gray-100
              hover:shadow-lg transition duration-300">

    <div class="flex justify-between items-center">

      <div>
        <p class="text-sm text-gray-500">Platillos</p>
        <h2 class="text-3xl font-bold text-blue-700 mt-2">
          {{ totalPlatillos }}
        </h2>
        <p class="text-xs text-gray-400 mt-1">
          registrados en el sistema
        </p>
      </div>

      <!-- ICONO MISMO ESTILO QUE SIDEBAR -->
      <div class="bg-blue-100 p-3 rounded-xl">
        <i class="fa-solid fa-utensils text-blue-700 text-xl"></i>
      </div>

    </div>
  </div>


  <!-- INGREDIENTES -->
  <div class="bg-white rounded-xl shadow-md p-6 border border-gray-100
              hover:shadow-lg transition duration-300">

    <div class="flex justify-between items-center">

      <div>
        <p class="text-sm text-gray-500">Ingredientes</p>
        <h2 class="text-3xl font-bold text-orange-600 mt-2">
          {{ totalIngredientes }}
        </h2>
        <p class="text-xs text-gray-400 mt-1">
          disponibles en inventario
        </p>
      </div>

      <div class="bg-orange-100 p-3 rounded-xl">
        <i class="fa-solid fa-carrot text-orange-600 text-xl"></i>
      </div>

    </div>
  </div>

</div>
