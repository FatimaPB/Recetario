<!-- TOASTS -->
<div class="fixed top-6 right-6 z-[9999] space-y-3">

  <div *ngFor="let toast of toasts" class="min-w-[280px] max-w-sm px-5 py-4 rounded-2xl shadow-2xl
            text-white text-sm font-medium
            animate-[fadeIn_0.3s_ease-out]" [ngClass]="{
       'bg-emerald-600': toast.tipo === 'success',
       'bg-red-600': toast.tipo === 'error',
       'bg-amber-500 text-black': toast.tipo === 'warning',
       'bg-blue-600': toast.tipo === 'info'
     }">

    <div class="flex items-center gap-3">

      <!-- ICONO -->
      <div [ngClass]="{
            'text-emerald-300': toast.tipo === 'success',
            'text-red-300': toast.tipo === 'error',
            'text-yellow-300': toast.tipo === 'warning',
            'text-blue-300': toast.tipo === 'info'
          }">

        <i *ngIf="toast.tipo === 'success'" class="fa-solid fa-circle-check"></i>
        <i *ngIf="toast.tipo === 'error'" class="fa-solid fa-circle-xmark"></i>
        <i *ngIf="toast.tipo === 'warning'" class="fa-solid fa-triangle-exclamation"></i>
        <i *ngIf="toast.tipo === 'info'" class="fa-solid fa-circle-info"></i>

      </div>

      <!-- MENSAJE -->
      <div class="flex-1">
        {{ toast.mensaje }}
      </div>

      <!-- BOTÓN CERRAR -->
      <button (click)="cerrarToast(toast.id)" class="text-white/70 hover:text-white transition">
        ✕
      </button>

    </div>

    <!-- BARRA DE PROGRESO -->
    <div class="mt-3 h-1 rounded-full overflow-hidden bg-white/20">
      <div class="h-full bg-white w-full animate-progress"></div>
    </div>

  </div>

</div>


<!-- HEADER -->
<div class="flex justify-between items-center mb-6">

  <div>
    <h1 class="text-2xl font-semibold text-gray-800">Platillos</h1>
    <p class="text-sm text-gray-500">
      Administración de recetas y platillos del sistema.
    </p>
  </div>

  <div class="flex gap-3">

    <!-- BOTÓN RECETARIO COMPLETO -->
    <button (click)="exportarRecetarioCompleto()"
      class="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2.5 rounded-xl shadow-lg transition text-sm font-medium">
      <i class="fa-solid fa-book-open"></i>
      Exportar Recetario PDF
    </button>

    <!-- BOTÓN AGREGAR -->
    <button (click)="abrirDrawer()"
      class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl shadow-lg transition text-sm font-medium">
      <i class="fa-solid fa-plus"></i>
      Agregar Platillo
    </button>

  </div>

</div>


<!-- CARD -->
<div class="bg-white rounded-xl shadow-md w-full">

  <!-- BUSCADOR -->
  <div class="flex justify-between items-center p-5 border-b">

    <div class="relative w-full max-w-md">
      <input type="text" placeholder="Buscar platillo..." [(ngModel)]="filtro"
        class="w-full pl-11 pr-4 py-2.5 text-sm border rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none" />

      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-gray-400 absolute left-3 top-3" fill="none"
        viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M10 18a8 8 0 100-16 8 8 0 000 16z" />
      </svg>
    </div>

  </div>




  <!-- TABLA -->
  <div class="overflow-x-auto">

    <table class="w-full text-sm">

      <thead>
        <tr class="text-left text-xs text-gray-500 uppercase tracking-wide border-b">
          <th class="px-6 py-4">Platillo</th>
          <th class="px-6 py-4">Subcategoría</th>
          <th class="px-6 py-4">Estado</th>
          <th class="px-6 py-4 text-center">Acciones</th>
        </tr>
      </thead>

      <tbody>

        <tr *ngIf="platillosFiltrados.length === 0">
          <td colspan="4" class="text-center py-6 text-gray-400">
            No hay platillos registrados.
          </td>
        </tr>

        <tr *ngFor="let p of platillosFiltrados" class="border-t hover:bg-gray-50 transition">

          <!-- PLATILLO + IMAGEN -->
          <td class="px-6 py-4 flex items-center gap-3">

            <img *ngIf="p.imagen" [src]="'http://localhost:3000' + p.imagen"
              class="w-12 h-12 object-cover rounded-lg shadow">

            <span class="font-medium text-gray-800">
              {{ p.nombre }}
            </span>

          </td>

          <!-- SUBCATEGORIA -->
          <td class="px-6 py-4">
            <span class="bg-gray-200 text-gray-600 text-xs px-2.5 py-1 rounded-lg">
              {{ p.subcategoria }}
            </span>
          </td>

          <!-- ESTADO -->
          <td class="px-6 py-4">
            <span class="text-xs px-2.5 py-1 rounded-lg" [ngClass]="p.activo ? 
                'bg-green-100 text-green-700' : 
                'bg-red-100 text-red-700'">

              {{ p.activo ? 'Activo' : 'Inactivo' }}
            </span>
          </td>

          <!-- ACCIONES -->
          <!-- ACCIONES -->
          <td class="px-6 py-4 text-center">
            <div class="flex justify-center gap-4">

              <!-- VER RECETA -->
              <button [routerLink]="['/platillos', p.id_platillo, 'receta']"
                class="text-emerald-600 hover:text-emerald-800 transition" title="Ver Receta">
                <i class="fa-solid fa-file-lines"></i>
              </button>


              <!-- EDITAR -->
              <button (click)="editar(p)" class="text-blue-600 hover:text-blue-800 transition" title="Editar">
                <i class="fa-solid fa-pen"></i>
              </button>

              <!-- ELIMINAR -->
              <button (click)="eliminar(p.id_platillo!)" class="text-red-600 hover:text-red-800 transition"
                title="Eliminar">
                <i class="fa-solid fa-trash"></i>
              </button>

              <!-- EXPORTAR CON PRECIO -->
              <button (click)="exportarPDFPlatillo(p, true)" class="text-gray-700 hover:text-black transition"
                title="Exportar PDF con precio">
                <i class="fa-solid fa-file-invoice-dollar"></i>
              </button>

              <!-- EXPORTAR SIN PRECIO -->
              <button (click)="exportarPDFPlatillo(p, false)" class="text-indigo-600 hover:text-indigo-800 transition"
                title="Exportar PDF sin precio">
                <i class="fa-solid fa-file-pdf"></i>
              </button>

            </div>
          </td>


        </tr>

      </tbody>

    </table>

  </div>

</div>


<!-- OVERLAY + DRAWER -->
<div *ngIf="mostrarDrawer" class="fixed inset-0 z-50">

  <!-- FONDO DIFUMINADO -->
  <div class="absolute inset-0 bg-black/30 backdrop-blur-sm overlay-fade" (click)="cerrarDrawer()">
  </div>

  <!-- DRAWER -->
  <div class="absolute top-0 right-0 h-full w-[420px] bg-white shadow-2xl
              animate-slide-in">

    <div class="h-full flex flex-col p-8 overflow-y-auto">

      <!-- HEADER -->
      <div class="flex justify-between items-center mb-8">
        <h2 class="text-xl font-semibold text-gray-800">
          {{ editando ? 'Editar Platillo' : 'Nuevo Platillo' }}
        </h2>

        <button (click)="cerrarDrawer()" class="text-gray-400 hover:text-gray-700 text-xl">
          ✕
        </button>
      </div>


      <form (ngSubmit)="guardar()" class="flex flex-col flex-1">

        <!-- Nombre -->
        <div class="mb-6">
          <label class="block text-sm text-gray-600 mb-2">
            Nombre del Platillo
          </label>
          <input type="text" [(ngModel)]="nuevoPlatillo.nombre" name="nombre" required
            class="w-full px-4 py-3 border rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>

        <!-- Descripción -->
        <div class="mb-6">
          <label class="block text-sm text-gray-600 mb-2">
            Descripción
          </label>
          <textarea [(ngModel)]="nuevoPlatillo.descripcion" name="descripcion" rows="3"
            class="w-full px-4 py-3 border rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none">
        </textarea>
        </div>

        <!-- Subcategoría -->
        <div class="mb-6">
          <label class="block text-sm text-gray-600 mb-2">
            Subcategoría
          </label>

          <select [(ngModel)]="nuevoPlatillo.id_subcategoria" name="id_subcategoria" required
            class="w-full px-4 py-3 border rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none">

            <option value="" disabled selected>
              Selecciona una subcategoría
            </option>

            <option *ngFor="let s of subcategorias" [value]="s.id_subcategoria">
              {{ s.nombre }}
            </option>

          </select>
        </div>

        <!-- Imagen -->
        <div class="mb-6">
          <label class="block text-sm text-gray-600 mb-2">
            Imagen del Platillo
          </label>

          <input type="file" (change)="onFileSelected($event)" accept="image/*"
            class="w-full text-sm border rounded-2xl px-4 py-2 bg-white">

          <div *ngIf="previewImagen" class="mt-4">
            <img [src]="previewImagen" class="w-32 h-32 object-cover rounded-xl shadow">
          </div>
        </div>

        <!-- Estado -->
        <div class="mb-8">
          <label class="flex items-center gap-3 text-sm text-gray-600">
            <input type="checkbox" [(ngModel)]="nuevoPlatillo.activo" name="activo" class="w-4 h-4">
            Platillo Activo
          </label>
        </div>

        <!-- BOTÓN -->
        <button type="submit"
          class="mt-auto bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl shadow-lg hover:shadow-xl transition text-sm font-medium">
          {{ editando ? 'Actualizar Platillo' : 'Guardar Platillo' }}
        </button>

      </form>

    </div>

  </div>
